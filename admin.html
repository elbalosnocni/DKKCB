<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KCB Admin Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f4f6f9}.sidebar{min-height:100vh;background:#212529;color:#fff}
.sidebar a{color:#fff;text-decoration:none;display:block;padding:10px}.card{border-radius:12px}
</style>
</head>
<body>
<div class="container-fluid">
<div class="row">
<div class="col-md-2 sidebar p-3">
<h4>KCB Admin</h4><hr>
<a href="#">📊 Dashboard</a>
<a href="#">👥 Nhân viên</a>
<a href="#">🏥 Bệnh viện</a>
<a href="#">📝 Đăng ký</a>
<a href="#">⚙️ Cài đặt</a>
<a href="#">📈 Báo cáo</a>
</div>
<div class="col-md-10 p-4">
<h2>Dashboard</h2>
<div class="row g-3">
<div class="col-md-3"><div class="card p-3"><h6>Tổng NV</h6><h2 id="emp">0</h2></div></div>
<div class="col-md-3"><div class="card p-3"><h6>Đã đăng ký</h6><h2 id="reg">0</h2></div></div>
<div class="col-md-3"><div class="card p-3"><h6>Chưa đăng ký</h6><h2 id="remain">0</h2></div></div>
<div class="col-md-3"><div class="card p-3"><h6>Trạng thái</h6><span class="badge bg-success">OPEN</span></div></div>
</div>
<div class="card mt-4 p-3">
<h4>Cài đặt hệ thống</h4>
<div class="row">
<div class="col-md-4"><label>Mở đăng ký</label><input type="datetime-local" class="form-control"></div>
<div class="col-md-4"><label>Đóng đăng ký</label><input type="datetime-local" class="form-control"></div>
<div class="col-md-4"><label>Trạng thái</label><select class="form-select"><option>OPEN</option><option>CLOSED</option></select></div>
</div>
<button class="btn btn-primary mt-3">Lưu cài đặt</button>
</div>
<div class="card mt-4 p-3">
<h4>Danh sách đăng ký</h4>
<table class="table table-bordered">
<thead><tr><th>Mã NV</th><th>Họ tên</th><th>BV mới</th><th>Thời gian</th></tr></thead>
<tbody><tr><td colspan="4" class="text-center">Kết nối Apps Script để tải dữ liệu</td></tr></tbody>
</table>
</div>
</div></div></div>
</body></html>
